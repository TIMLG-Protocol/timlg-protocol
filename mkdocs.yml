site_name: TIMLG Protocol
site_description: Verifiable time-log coordination for reproducible research.
site_url: https://www.timlg.org
repo_url: https://github.com/richarddmm/timlg-protocol
repo_name: richarddmm/timlg-protocol

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light mode
  logo: assets/icon_vector_logo.svg
  favicon: assets/icon_vector_logo.svg

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/TIMLG_Protocol
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/richard-david-mart%C3%ADn-mart%C3%ADn-9845b474/
    - icon: fontawesome/brands/github
      link: https://github.com/richarddmm/timlg-protocol

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/persistent-iframe.js

markdown_extensions:
  - admonition
  - md_in_html
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.inlinehilite
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/beta.css
  - stylesheets/roadmap.css
  - stylesheets/status.css
  - stylesheets/persistent-iframe.css

nav:
  - Home: index.md
  - Status:
      - Current Status: status/status.md
      - Changelog: status/changelog.md
  - App:
      - App: beta.md
      - Guide: devnet_guide.md
  - Live Audit: audit.md
  - Whitepaper:
      - Overview: whitepaper/index.md
      - Changelog: whitepaper/changelog.md
  - Protocol:
      - Architecture Overview: protocol/overview.md
      - Operational Lifecycle: LIFECYCLE.md
      - 1. Temporal Logic:
          - Gating & Timing Windows: protocol/timing_windows.md
          - Parameter Mapping: protocol/parameters.md
          - Fault Tolerance: protocol/fault_tolerance.md
      - 2. Economic Logic:
          - Metrological Finality: protocol/settlement_rules.md
          - Tokenomics & Fees: protocol/tokenomics.md
          - Treasury & BitIndex: protocol/treasury_bitindex.md
      - 3. Technical Topology:
          - PDA Seed Topography: protocol/pdas_and_accounts.md
          - User Statistics: protocol/user_stats.md
          - Cryptographic Envelopes: protocol/signatures_and_replay_protection.md
          - Oracle Trust Model: protocol/oracle_trust_model.md
      - 4. Implementation Details:
          - Automation & Cranks: protocol/automation.md
          - Log Specification: protocol/log_format.md
          - Account Migration: protocol/migration.md
      - 5. Support & Reference:
          - Technical Quickstart: protocol/devnet_quickstart.md
          - Troubleshooting: protocol/troubleshooting.md
          - Nomenclature (Glossary): protocol/glossary.md
          - Error Reference: protocol/errors.md
          - Operator Runbook: runbook-devnet.md

  - Roadmap: roadmap/index.md
  - Security & Control:
      - Overview: security/index.md
      - Privileged Adversary Model: security/privileged_adversary.md
      - Recovery and Safety Invariants: security/recovery_invariants.md
      - Authorities: security/authorities.md
      - Threat Model: security/threat_model.md
      - Disclosure: security/disclosure.md
  - Team & Contact: team/index.md
  - Support: support/index.md
